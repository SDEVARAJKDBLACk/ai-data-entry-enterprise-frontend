<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>LangAI - Gemini Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow: hidden; }
        .tab-content { display: none; height: 100%; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bubble { border-radius: 20px; padding: 12px 16px; font-size: 14px; max-width: 85%; }
        .bubble-ai { background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
        .bubble-user { background: #4f46e5; color: white; border-bottom-right-radius: 4px; }
        .nav-btn.active { background: #eef2ff; color: #4f46e5; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row">

    <aside class="hidden md:flex w-64 bg-white border-r flex-col p-6 space-y-8">
        <div class="text-indigo-600 font-extrabold text-2xl flex items-center gap-2">
            <span class="material-icons">psychology</span> LangAI
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="switchTab('dashboard')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl font-bold text-slate-500 active">
                <span class="material-icons">person</span> Profile
            </button>
            <button onclick="switchTab('chat')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl font-bold text-slate-500">
                <span class="material-icons">auto_awesome</span> Nova AI
            </button>
            <button onclick="switchTab('translator')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl font-bold text-slate-500">
                <span class="material-icons">g_translate</span> Translator
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden pb-16 md:pb-0">
        
        <section id="dashboard" class="tab-content active p-6 md:p-10 overflow-y-auto">
            <h1 class="text-2xl font-black mb-6">User Dashboard</h1>
            <div class="bg-white p-6 rounded-3xl border shadow-sm flex items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg">U</div>
                <div>
                    <h2 class="font-black text-lg">Active Learner</h2>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Level 1 • 150 XP</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-3xl border text-center shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Streak</p>
                    <p class="text-3xl font-black text-orange-500">5 Days</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border text-center shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Progress</p>
                    <p class="text-3xl font-black text-indigo-600">24%</p>
                </div>
            </div>
        </section>

        <section id="chat" class="tab-content h-full bg-white">
            <header class="p-4 border-b flex justify-between items-center px-6 bg-white z-10">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="font-bold text-sm">Nova AI Teacher</span>
                </div>
                <select id="teachTarget" class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-3 py-1.5 rounded-lg border-none outline-none">
                    <option value="Tamil">Learn Tamil</option>
                    <option value="Hindi">Learn Hindi</option>
                    <option value="English">Learn English</option>
                </select>
            </header>
            <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50">
                <div class="flex justify-start">
                    <div class="bubble bubble-ai shadow-sm">
                        Hello! I am Nova. Naan Gemini AI moolam ungalukku teach pannuven. Pesalaama?
                    </div>
                </div>
            </div>
            <div id="thinking" class="hidden px-6 py-2 text-[10px] font-black text-indigo-500 animate-pulse tracking-widest">GEMINI IS THINKING...</div>
            <div class="p-4 border-t bg-white">
                <div class="max-w-4xl mx-auto flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl border">
                    <input id="chatInput" type="text" placeholder="Type or use mic..." class="flex-1 bg-transparent px-3 outline-none text-sm font-medium h-10">
                    <button id="micBtn" class="w-10 h-10 bg-white text-slate-400 rounded-xl flex items-center justify-center border shadow-sm"><span class="material-icons">mic</span></button>
                    <button onclick="askGemini()" class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center shadow-lg"><span class="material-icons">send</span></button>
                </div>
            </div>
        </section>

        <section id="translator" class="tab-content p-6">
            <h1 class="text-2xl font-black mb-6">Quick Translator</h1>
            <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                <textarea id="transIn" class="w-full h-32 bg-transparent outline-none text-lg resize-none" placeholder="Enter English text..."></textarea>
                <div class="flex justify-between items-center border-t pt-4">
                    <select id="targetL" class="bg-slate-50 p-2 rounded-xl text-[10px] font-black">
                        <option value="ta">to Tamil</option>
                        <option value="hi">to Hindi</option>
                    </select>
                    <button onclick="quickTrans()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-black shadow-lg">Translate</button>
                </div>
            </div>
            <div id="transResult" class="mt-4 p-6 bg-indigo-50 border-2 border-indigo-100 rounded-3xl hidden">
                <p id="transOutput" class="text-xl font-black text-indigo-900"></p>
                <button onclick="speakVoice(document.getElementById('transOutput').innerText)" class="mt-3 text-indigo-600 font-bold flex items-center gap-1"><span class="material-icons">volume_up</span> Hear</button>
            </div>
        </section>

        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
            <button onclick="switchTab('dashboard')" class="flex flex-col items-center text-indigo-600"><span class="material-icons">person</span><span class="text-[10px] font-bold">Profile</span></button>
            <button onclick="switchTab('chat')" class="flex flex-col items-center text-slate-400"><span class="material-icons">auto_awesome</span><span class="text-[10px] font-bold">Nova AI</span></button>
            <button onclick="switchTab('translator')" class="flex flex-col items-center text-slate-400"><span class="material-icons">g_translate</span><span class="text-[10px] font-bold">Trans</span></button>
        </nav>
    </main>

    <script>
        // API Key Placeholder
        const API_KEY = "AIzaSyAWhckbvkOD1KJiP0wY8Jrz-tYqua4LMjc"; 

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-400'));
            event.currentTarget.classList.replace('text-slate-400', 'text-indigo-600');
        }

        async function askGemini() {
            const input = document.getElementById('chatInput');
            const target = document.getElementById('teachTarget').value;
            const text = input.value.trim();
            const loader = document.getElementById('thinking');
            if(!text) return;

            addMsg(text, 'user');
            input.value = "";
            loader.classList.remove('hidden');

            const prompt = `User says: "${text}". You are Nova, a language teacher. 
            User wants to learn ${target}. 
            1. Identify grammar errors in input. 
            2. Explain errors in simple words. 
            3. Translate the correct sentence to ${target}.
            Keep response clean and teaching-focused.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                loader.classList.add('hidden');
                addMsg(reply, 'ai');
                speakVoice(reply);
            } catch (e) {
                loader.classList.add('hidden');
                addMsg("API Connection Error! Check your GitHub Secrets and Key.", 'ai');
            }
        }

        async function quickTrans() {
            const t = document.getElementById('transIn').value;
            const l = document.getElementById('targetL').value;
            const out = document.getElementById('transOutput');
            if(!t) return;
            out.innerText = "Translating...";
            document.getElementById('transResult').classList.remove('hidden');
            
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(t)}&langpair=en|${l}`);
            const data = await res.json();
            out.innerText = data.responseData.translatedText;
        }

        function addMsg(c, s) {
            const box = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `flex ${s === 'user' ? 'justify-end' : 'justify-start'}`;
            d.innerHTML = `<div class="bubble bubble-${s} shadow-sm">${c}</div>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        function speakVoice(t) {
            const u = new SpeechSynthesisUtterance(t);
            window.speechSynthesis.speak(u);
        }

        // Mic Integration
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        document.getElementById('micBtn').onclick = () => { rec.start(); document.getElementById('micBtn').style.color="red"; };
        rec.onresult = (e) => { document.getElementById('chatInput').value = e.results[0][0].transcript; askGemini(); };
        rec.onend = () => { document.getElementById('micBtn').style.color="#94a3b8"; };
    </script>
</body>
</html>
