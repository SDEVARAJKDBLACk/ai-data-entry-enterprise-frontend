<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>LangAI - Nova AI Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow: hidden; }
        .tab-content { display: none; height: 100%; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bubble { border-radius: 20px; padding: 12px 16px; font-size: 14px; max-width: 85%; line-height: 1.6; }
        .bubble-ai { background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; color: #1e293b; }
        .bubble-user { background: #4f46e5; color: white; border-bottom-right-radius: 4px; }
        .nav-btn.active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="bg-white border-b flex justify-around p-2 md:p-4 shrink-0">
        <button onclick="switchTab('dashboard')" class="nav-btn active flex flex-col items-center p-2"><span class="material-icons">person</span><span class="text-[10px] font-bold">Profile</span></button>
        <button onclick="switchTab('chat')" class="nav-btn flex flex-col items-center p-2"><span class="material-icons">auto_awesome</span><span class="text-[10px] font-bold">Nova AI</span></button>
        <button onclick="switchTab('translator')" class="nav-btn flex flex-col items-center p-2"><span class="material-icons">g_translate</span><span class="text-[10px] font-bold">Trans</span></button>
    </nav>

    <main class="flex-1 relative overflow-hidden pb-4">
        
        <section id="dashboard" class="tab-content active p-6 overflow-y-auto">
            <h1 class="text-2xl font-black mb-6">Learning Profile</h1>
            <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl mb-6">
                <p class="text-xs font-bold opacity-70 uppercase tracking-widest mb-1">Current Progress</p>
                <h2 class="text-3xl font-black mb-4">Level 01</h2>
                <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden">
                    <div class="bg-white h-full w-[35%]"></div>
                </div>
                <p class="text-[10px] mt-2 font-bold opacity-80">350 XP / 1000 XP to Level 2</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Streak</p>
                    <p class="text-2xl font-black">5 Days</p>
                </div>
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Words</p>
                    <p class="text-2xl font-black">124</p>
                </div>
            </div>
        </section>

        <section id="chat" class="tab-content h-full bg-white">
            <header class="p-3 border-b flex justify-between items-center px-6">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="font-bold text-sm">Nova AI Teacher</span>
                </div>
                <select id="targetLang" class="bg-slate-100 text-[10px] font-black px-2 py-1 rounded-lg">
                    <option value="Tamil">Learn Tamil</option>
                    <option value="Hindi">Learn Hindi</option>
                    <option value="English">Learn English</option>
                </select>
            </header>

            <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50 h-[calc(100vh-250px)]">
                <div class="flex justify-start">
                    <div class="bubble bubble-ai shadow-sm">
                        <b>Vanakkam!</b> Naan Nova AI. Neenga entha language padika poringa? Text or Mic use panni pesunga!
                    </div>
                </div>
            </div>

            <div id="loading" class="hidden px-6 py-1 text-[10px] text-indigo-500 font-bold tracking-tighter">NOVA IS ANALYZING...</div>

            <div class="p-4 border-t bg-white absolute bottom-0 w-full">
                <div class="max-w-4xl mx-auto flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl border">
                    <input id="chatInput" type="text" placeholder="Type here..." class="flex-1 bg-transparent px-3 outline-none text-sm h-10">
                    <button id="micBtn" class="w-10 h-10 bg-white text-slate-400 rounded-xl flex items-center justify-center border shadow-sm"><span class="material-icons">mic</span></button>
                    <button onclick="askGemini()" class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center shadow-lg"><span class="material-icons">send</span></button>
                </div>
            </div>
        </section>

        <section id="translator" class="tab-content p-6">
            <h1 class="text-2xl font-black mb-6">Global Translator</h1>
            <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                <textarea id="transInput" class="w-full h-32 bg-transparent outline-none text-lg resize-none" placeholder="Enter text to translate..."></textarea>
                <div class="flex justify-between items-center border-t pt-4">
                    <select id="langChoice" class="bg-slate-50 p-2 rounded-xl text-xs font-bold">
                        <option value="ta">to Tamil</option>
                        <option value="hi">to Hindi</option>
                        <option value="en">to English</option>
                    </select>
                    <button onclick="runTranslation()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold shadow-md">Translate</button>
                </div>
            </div>
            <div id="transResult" class="mt-4 p-6 bg-indigo-50 border-2 border-indigo-100 rounded-3xl hidden">
                <p id="transOutput" class="text-xl font-black text-indigo-900"></p>
                <button onclick="speakText(document.getElementById('transOutput').innerText)" class="mt-2 text-indigo-600 font-bold flex items-center gap-1 text-sm"><span class="material-icons text-sm">volume_up</span> Hear Voice</button>
            </div>
        </section>
    </main>

    <script>
        // GitHub Action replaces this __GEMINI_API_KEY__
        const API_KEY = "__GEMINI_API_KEY__"; 

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function askGemini() {
            const input = document.getElementById('chatInput');
            const target = document.getElementById('targetLang').value;
            const text = input.value.trim();
            const loader = document.getElementById('loading');
            if(!text) return;

            addMsg(text, 'user');
            input.value = "";
            loader.classList.remove('hidden');

            // SYSTEM PROMPT FOR NOVA
            const systemPrompt = `You are Nova, an expert language tutor. The user is trying to learn ${target}. 
            1. If the user's sentence (in any language) has grammar or spelling mistakes, point them out kindly.
            2. Explain WHY it was wrong and provide the correct version.
            3. Translate the correct version into ${target}.
            4. If it's correct, praise them and continue the conversation in ${target}.
            Keep response concise and helpful.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: systemPrompt + "\nUser Input: " + text }] }],
                        safetySettings: [
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ]
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    addMsg("Error: " + data.error.message, 'ai');
                } else {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    loader.classList.add('hidden');
                    addMsg(aiReply, 'ai');
                    speakText(aiReply);
                }
            } catch (err) {
                loader.classList.add('hidden');
                addMsg("Connection Error. Check API Key in Secrets!", 'ai');
            }
        }

        async function runTranslation() {
            const text = document.getElementById('transInput').value;
            const lang = document.getElementById('langChoice').value;
            const out = document.getElementById('transOutput');
            const resCard = document.getElementById('transResult');
            if(!text) return;

            out.innerText = "Translating...";
            resCard.classList.remove('hidden');

            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=auto|${lang}`);
            const data = await res.json();
            out.innerText = data.responseData.translatedText;
        }

        function addMsg(content, sender) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            // Handle markdown-like line breaks from Gemini
            const formattedContent = content.replace(/\n/g, '<br>');
            div.innerHTML = `<div class="bubble bubble-${sender} shadow-sm">${formattedContent}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function speakText(text) {
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
        }

        // SPEECH RECOGNITION (Voice Chat)
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US'; // Gemini handles multilingual translation anyway

        document.getElementById('micBtn').onclick = () => {
            recognition.start();
            document.getElementById('micBtn').style.color = "red";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('chatInput').value = transcript;
            askGemini();
        };

        recognition.onend = () => {
            document.getElementById('micBtn').style.color = "#94a3b8";
        };

    </script>
</body>
</html>
