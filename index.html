<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>LangAI - Nova AI Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow: hidden; }
        .tab-content { display: none; height: 100%; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bubble { border-radius: 20px; padding: 12px 16px; font-size: 14px; max-width: 85%; line-height: 1.6; }
        .bubble-ai { background: white; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; color: #1e293b; }
        .bubble-user { background: #4f46e5; color: white; border-bottom-right-radius: 4px; }
        .nav-btn.active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="bg-white border-b flex justify-around p-2 shrink-0">
        <button onclick="switchTab('dashboard')" class="nav-btn active flex flex-col items-center p-2"><span class="material-icons">person</span><span class="text-[10px] font-bold">Profile</span></button>
        <button onclick="switchTab('chat')" class="nav-btn flex flex-col items-center p-2"><span class="material-icons">auto_awesome</span><span class="text-[10px] font-bold">Nova AI</span></button>
        <button onclick="switchTab('translator')" class="nav-btn flex flex-col items-center p-2"><span class="material-icons">g_translate</span><span class="text-[10px] font-bold">Trans</span></button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        
        <section id="dashboard" class="tab-content active p-6 overflow-y-auto">
            <h1 class="text-2xl font-black mb-6">Learning Dashboard</h1>
            <div class="bg-indigo-600 p-8 rounded-[2rem] text-white shadow-xl mb-6">
                <p class="text-xs font-bold opacity-70 mb-1 uppercase">Your Progress</p>
                <h2 class="text-3xl font-black mb-4">Level 01</h2>
                <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden">
                    <div class="bg-white h-full w-[40%]"></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl border shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Streak</p>
                    <p class="text-2xl font-black">7 Days</p>
                </div>
                <div class="bg-white p-5 rounded-3xl border shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Rank</p>
                    <p class="text-2xl font-black">#12</p>
                </div>
            </div>
        </section>

        <section id="chat" class="tab-content h-full bg-white">
            <header class="p-3 border-b flex justify-between items-center px-6">
                <span class="font-bold text-sm">Nova AI Tutor (1.5 Stable)</span>
                <select id="targetLang" class="bg-slate-100 text-[10px] font-black px-2 py-1 rounded-lg">ii
                    <option value="Tamil">Learn Tamil</option>
                    <option value="Hindi">Learn Hindi</option>
                    <option value="English">Learn English</option>
                </select>
            </header>

            <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50 h-[calc(100vh-220px)]">
                <div class="flex justify-start">
                    <div class="bubble bubble-ai shadow-sm">
                        <b>Vanakkam!</b> Naan Nova AI. Neenga pesura language-la mistakes irundhaa thiruthi explain pannuven. Start pannalaama?
                    </div>
                </div>
            </div>

            <div id="loading" class="hidden px-6 py-1 text-[10px] text-indigo-500 font-bold animate-pulse">NOVA IS ANALYZING...</div>

            <div class="p-4 border-t bg-white absolute bottom-0 w-full">
                <div class="max-w-4xl mx-auto flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl border">
                    <input id="chatInput" type="text" placeholder="Type or use mic..." class="flex-1 bg-transparent px-3 outline-none text-sm h-10">
                    <button id="micBtn" class="w-10 h-10 bg-white text-slate-400 rounded-xl flex items-center justify-center border shadow-sm"><span class="material-icons">mic</span></button>
                    <button onclick="askGemini()" class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center shadow-lg"><span class="material-icons">send</span></button>
                </div>
            </div>
        </section>

        <section id="translator" class="tab-content p-6">
            <h1 class="text-2xl font-black mb-6">Quick Translator</h1>
            <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                <textarea id="transInput" class="w-full h-32 bg-transparent outline-none text-lg resize-none" placeholder="Enter text..."></textarea>
                <div class="flex justify-between items-center pt-4 border-t">
                    <select id="langChoice" class="bg-slate-50 p-2 rounded-xl text-xs font-bold">
                        <option value="ta">to Tamil</option>
                        <option value="hi">to Hindi</option>
                    </select>
                    <button onclick="runTranslation()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">Translate</button>
                </div>
            </div>
            <div id="transResult" class="mt-4 p-6 bg-indigo-50 border-2 border-indigo-100 rounded-3xl hidden">
                <p id="transOutput" class="text-xl font-black text-indigo-900"></p>
            </div>
        </section>
    </main>

    <script>
        // API Key placeholder - GitHub Action will replace this
        const API_KEY = "AIzaSyB4vgicvqP35HTHsucgL6RwUs6EZkFIzVw"; 

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
 
        async function askGemini() {
    const input = document.getElementById('chatInput');
    const target = document.getElementById('targetLang').value;
    const text = input.value.trim();
    if(!text) return;

    addMsg(text, 'user');
    input.value = "";
    document.getElementById('loading').classList.remove('hidden');

    const systemPrompt = `You are Nova, an AI tutor. User is learning ${target}. 1. Correct grammar mistakes. 2. Explain them. 3. Translate to ${target}.`;

    try {
        // FIXED URL: v1beta endpoint supports all newer models
        // 'v1' badhilaaga 'v1beta' nu maathunga
const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
 {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                contents: [{ parts: [{ text: systemPrompt + "\nUser Input: " + text }] }]
            })
        });

        const data = await response.json();
        
        if(data.error) {
            // Error handling if quota or key issues arise
            addMsg("Nova Error: " + data.error.message, 'ai');
        } else {
            const aiReply = data.candidates[0].content.parts[0].text;
            addMsg(aiReply, 'ai');
            speakText(aiReply);
        }
    } catch (err) {
        addMsg("Connection Error. Please refresh.", 'ai');
    } finally {
        document.getElementById('loading').classList.add('hidden');
    }
                }
            

        async function runTranslation() {
            const t = document.getElementById('transInput').value;
            const l = document.getElementById('langChoice').value;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(t)}&langpair=auto|${l}`);
            const data = await res.json();
            document.getElementById('transOutput').innerText = data.responseData.translatedText;
            document.getElementById('transResult').classList.remove('hidden');
        }

        function addMsg(c, s) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `flex ${s === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="bubble bubble-${s} shadow-sm">${c.replace(/\n/g, '<br>')}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function speakText(text) {
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
        }

        // Voice Support
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        document.getElementById('micBtn').onclick = () => { recognition.start(); document.getElementById('micBtn').style.color = "red"; };
        recognition.onresult = (event) => { document.getElementById('chatInput').value = event.results[0][0].transcript; askGemini(); };
        recognition.onend = () => { document.getElementById('micBtn').style.color = "#94a3b8"; };
    </script>
</body>
    </html>
